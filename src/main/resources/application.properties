# Nombre lógico de la aplicación en Spring (logs/metrics).
spring.application.name=ms-usuarios

# Configuración de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ms_usuarios_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Desarrollo: Hibernate ajusta el esquema al modelo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
